name: CI Pipeline LojaCarro

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Fazer Checkout do Codigo
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Dar permissao de execucao ao Maven
        run: chmod +x mvnw

      - name: Executar Testes Unitarios
        run: ./mvnw test